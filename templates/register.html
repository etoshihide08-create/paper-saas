<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新規登録 — リハエビデンスナビ</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
            background: #f0f4f8;
            margin: 0;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 40px 16px 24px;
            color: #1e293b;
        }

        .logo {
            text-align: center;
            margin-bottom: 16px;
        }

        .logo-icon {
            font-size: 36px;
            line-height: 1;
            margin-bottom: 8px;
        }

        .logo-name {
            font-size: 15px;
            font-weight: 700;
            color: #2563eb;
            letter-spacing: 0.02em;
        }

        .card {
            width: 100%;
            max-width: 420px;
            background: #fff;
            border-radius: 20px;
            padding: 32px 28px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
        }

        h1 {
            margin: 0 0 24px;
            font-size: 22px;
            font-weight: 800;
            color: #0f172a;
        }

        .field {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            font-weight: 700;
            color: #475569;
        }

        input {
            width: 100%;
            padding: 13px 14px;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            color: #0f172a;
            background: #f8fafc;
            transition: border-color 0.15s, box-shadow 0.15s;
            outline: none;
            -webkit-appearance: none;
        }

        input:focus {
            border-color: #2563eb;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: #2563eb;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.15s, transform 0.1s;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:hover { background: #1d4ed8; }
        .btn:active { transform: scale(0.98); }

        .error {
            background: #fef2f2;
            color: #b91c1c;
            padding: 12px 14px;
            border-radius: 10px;
            margin-bottom: 16px;
            font-size: 14px;
            border: 1px solid #fecaca;
        }

        .footer-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #64748b;
        }

        .footer-link a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 700;
        }

        .footer-link a:hover { text-decoration: underline; }

        @media (max-width: 480px) {
            .card {
                padding: 28px 20px;
                border-radius: 16px;
            }
            h1 { font-size: 20px; }
        }
    </style>
</head>
<body>
    <div class="logo">
        <div class="logo-icon">🩺</div>
        <div class="logo-name">リハエビデンスナビ</div>
    </div>

    <div class="card">
        <h1>新規登録</h1>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form action="/register" method="post">
            <div class="field">
                <label for="email">メールアドレス</label>
                <input type="email" id="email" name="email" autocomplete="email" required>
            </div>

            <div class="field">
                <label for="password">パスワード</label>
                <input type="password" id="password" name="password" autocomplete="new-password" required>
            </div>

            <button type="submit" class="btn">登録する</button>
        </form>

        <div class="footer-link">
            すでにアカウントをお持ちの方は <a href="/login">ログイン</a>
        </div>
    </div>
</body>
</html>
